# ─────────────────────────────────────────────────────────────
# Cerex Platform — Application Configuration
# ─────────────────────────────────────────────────────────────

spring:
  application:
    name: cerex-backend

  profiles:
    active: dev

  # ── JPA / Hibernate ────────────────────────────────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── Flyway Migrations ─────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: users_schema, recipes_schema, orders_schema, geo_schema, social_schema, media_schema, subscriptions_schema
    baseline-on-migrate: true

  # ── Jackson ─────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  # ── Kafka ───────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: cerex-backend
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.cerex.*

  # ── Servlet ─────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

# ── Server ──────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── OpenAPI / Swagger ───────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Cerex Custom Properties ─────────────────────────────────
cerex:
  jwt:
    secret: ${JWT_SECRET:cerex-dev-secret-key-that-should-be-replaced-in-production-2026}
    access-token-expiration: 3600000      # 1 hour in ms
    refresh-token-expiration: 604800000   # 7 days in ms
    issuer: cerex-platform
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:./uploads}
    max-file-size: 20971520  # 20 MB
  ai:
    openai-api-key: ${OPENAI_API_KEY:}
    model: ${AI_MODEL:gpt-4o}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}

# ── Logging ─────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.cerex: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
