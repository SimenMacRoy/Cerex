# ─────────────────────────────────────────────────────────
# Docker Compose for Cerex Platform (Development)
# ─────────────────────────────────────────────────────────
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f app    # Follow app logs
#   docker-compose down -v        # Stop and remove volumes
# ─────────────────────────────────────────────────────────

services:

  # ─────────────────────────────────────────────────────
  # Spring Boot Application
  # ─────────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cerex-app
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/cerex_db
      - SPRING_DATASOURCE_USERNAME=cerex_admin
      - SPRING_DATASOURCE_PASSWORD=cerex_dev_password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_MONGODB_URI=mongodb://cerex_admin:cerex_dev_password@mongo:27017/cerex_mongo?authSource=admin
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CEREX_JWT_SECRET=dev-secret-key-change-in-production-minimum-32-characters-long
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - cerex-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────
  # React Frontend (Nginx)
  # ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cerex-frontend
    ports:
      - "3002:80"
    depends_on:
      - app
    networks:
      - cerex-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cerex-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cerex_db
      - POSTGRES_USER=cerex_admin
      - POSTGRES_PASSWORD=cerex_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerex_admin -d cerex_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cerex-network

  # ─────────────────────────────────────────────────────
  # Redis 7.2
  # ─────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cerex-redis
    ports:
      - "6380:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cerex-network

  # ─────────────────────────────────────────────────────
  # MongoDB 7.0
  # ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: cerex-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=cerex_admin
      - MONGO_INITDB_ROOT_PASSWORD=cerex_dev_password
      - MONGO_INITDB_DATABASE=cerex_mongo
    volumes:
      - mongo_data:/data/db
    networks:
      - cerex-network

  # ─────────────────────────────────────────────────────
  # Elasticsearch 8.x
  # ─────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: cerex-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - cerex-network

  # ─────────────────────────────────────────────────────
  # Apache Kafka (KRaft mode - no Zookeeper)
  # ─────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: cerex-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    networks:
      - cerex-network

  # ─────────────────────────────────────────────────────
  # Kafka UI (optional dev tool)
  # ─────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cerex-kafka-ui
    ports:
      - "9091:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cerex-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - cerex-network

  # ─────────────────────────────────────────────────────
  # pgAdmin (optional dev tool)
  # ─────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cerex-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@cerex.dev
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - postgres
    networks:
      - cerex-network

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  elasticsearch_data:
  kafka_data:

networks:
  cerex-network:
    driver: bridge
